    <!-- JS для бургера -->
    <script>
        const burger = document.querySelector('.burger');
        const nav = document.querySelector('nav');

        burger.addEventListener('click', () => {
            nav.classList.toggle('active');
        });
    </script>
    <script>
        const images = [
            "assets/1.png",
            "assets/2.png",
            "assets/3.png",
            "assets/4.png"
        ];

        let current = 0;

        const img = document.getElementById("slider-image");
        const counter = document.getElementById("counter");
        const dotsContainer = document.getElementById("dots");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const prevBtnTOP = document.getElementById("prevBtnTOP");
        const nextBtnTOP = document.getElementById("nextBtnTOP");
        const prevBtnBOT = document.getElementById("prevBtnBOT");
        const nextBtnBOT = document.getElementById("nextBtnBOT");

        // создать точки
        images.forEach((_, index) => {
            const dot = document.createElement("span");
            if(index === 0) dot.classList.add("active");

            dot.addEventListener("click", () => {
                current = index;
                updateSlider();
            });

            dotsContainer.appendChild(dot);
        });

        function updateSlider() {
            img.src = images[current];
            counter.textContent = `${current + 1}/${images.length}`;

            // обновление точек
            document.querySelectorAll(".dots span").forEach((dot, i) => {
                dot.classList.toggle("active", i === current);
            });
        }

        // кнопки
        nextBtn.addEventListener("click", () => {
            current = (current + 1) % images.length;
            updateSlider();
        });

        prevBtn.addEventListener("click", () => {
            current = (current - 1 + images.length) % images.length;
            updateSlider();
        });
        // кнопки
        nextBtnTOP.addEventListener("click", () => {
            current = (current + 1) % images.length;
            updateSlider();
        });

        prevBtnTOP.addEventListener("click", () => {
            current = (current - 1 + images.length) % images.length;
            updateSlider();
        });
        nextBtnBOT.addEventListener("click", () => {
            current = (current + 1) % images.length;
            updateSlider();
        });

        prevBtnBOT.addEventListener("click", () => {
            current = (current - 1 + images.length) % images.length;
            updateSlider();
        });
    </script>

</body>
