    <!-- JS для бургера -->
    <script>
        const burger = document.querySelector('.burger');
        const nav = document.querySelector('nav');

        burger.addEventListener('click', () => {
            nav.classList.toggle('active');
        });
    </script>
    <script>
        const map = document.getElementById('map');
        const container = document.querySelector('.map-inner');

        const zoomInBtn = document.querySelector('.zoom-controls button:first-child');
        const zoomOutBtn = document.querySelector('.zoom-controls button:last-child');

        let scale = 1;
        let posX = 0;
        let posY = 0;

        const MIN_SCALE = 0.5;
        const MAX_SCALE = 3;

        // обновление
        function updateTransform() {
            map.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        // 🔥 ЗУМ КОЛЕСОМ
        container.addEventListener('wheel', (e) => {
            e.preventDefault();

            const zoomIntensity = 0.1;
            const rect = map.getBoundingClientRect();

            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const direction = e.deltaY > 0 ? -1 : 1;
            const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * (1 + direction * zoomIntensity)));

            const scaleRatio = newScale / scale;

            posX -= mouseX * (scaleRatio - 1);
            posY -= mouseY * (scaleRatio - 1);

            scale = newScale;

            updateTransform();
        });

        // функция зума в центр
        function zoomToCenter(factor) {
            const rect = container.getBoundingClientRect();

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
            const scaleRatio = newScale / scale;

            // смещаем относительно центра
            posX -= centerX * (scaleRatio - 1);
            posY -= centerY * (scaleRatio - 1);

            scale = newScale;

            updateTransform();
        }

        // кнопка +
        zoomInBtn.addEventListener('click', () => {
            zoomToCenter(1.2);
        });

        // кнопка -
        zoomOutBtn.addEventListener('click', () => {
            zoomToCenter(0.8);
        });
    </script>
    <script>
        let isDragging = false;
        let startX, startY;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            container.style.cursor = 'grabbing';

            startX = e.clientX - posX;
            startY = e.clientY - posY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            posX = e.clientX - startX;
            posY = e.clientY - startY;

            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });
    </script>
    <script>
        // 👉 ТАЧ ПЕРЕТАСКИВАНИЕ
        let touchStartX = 0;
        let touchStartY = 0;

        container.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;

                touchStartX = e.touches[0].clientX - posX;
                touchStartY = e.touches[0].clientY - posY;
            }
        });

        // движение пальцем
        container.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isDragging) {
                posX = e.touches[0].clientX - touchStartX;
                posY = e.touches[0].clientY - touchStartY;

                updateTransform();
            }
        });

        // отпустил
        container.addEventListener('touchend', () => {
            isDragging = false;
        });
    </script>
    <script>
        let initialDistance = null;
        let initialScale = 1;

        function getDistance(touches) {
            return Math.hypot(
                touches[0].clientX - touches[1].clientX,
                touches[0].clientY - touches[1].clientY
            );
        }

        container.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = getDistance(e.touches);
                initialScale = scale;
            }
        });

        container.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const newDistance = getDistance(e.touches);
                let newScale = initialScale * (newDistance / initialDistance);

                newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));

                scale = newScale;
                updateTransform();
            }
        });
    </script>
